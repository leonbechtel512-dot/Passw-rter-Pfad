<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Passwort World 3D</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* 3D Button Effekte */
        .btn-3d {
            transition: all 0.1s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        .btn-3d:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.2);
        }
        
        /* Island 3D Effekt für die Übersichtskarte */
        .island-3d {
            box-shadow: 0 15px 0 rgba(0,0,0,0.15), 0 20px 25px -5px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .island-3d:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 20px 0 rgba(0,0,0,0.15), 0 25px 30px -5px rgba(0,0,0,0.2);
        }
        .island-3d:active:not(:disabled) {
            transform: translateY(10px);
            box-shadow: 0 5px 0 rgba(0,0,0,0.15), 0 10px 10px -5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-sky-200 overflow-x-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- HILFS-KOMPONENTEN ---
        const Button3D = ({ children, onClick, color = "blue", className = "", disabled = false }) => {
            const colorMap = {
                blue: "bg-blue-500 hover:bg-blue-400 text-white",
                green: "bg-green-500 hover:bg-green-400 text-white",
                red: "bg-red-500 hover:bg-red-400 text-white",
                yellow: "bg-yellow-400 hover:bg-yellow-300 text-yellow-900",
                purple: "bg-purple-500 hover:bg-purple-400 text-white",
                gray: "bg-gray-400 hover:bg-gray-300 text-white",
            };
            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled}
                    className={`btn-3d w-full py-4 font-bold text-xl rounded-2xl ${colorMap[color]} ${disabled ? 'opacity-50 cursor-not-allowed transform-none shadow-none' : ''} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const DialogBox = ({ title, icon, children, color = "blue" }) => {
            const borders = { blue: "border-blue-300", yellow: "border-yellow-300", red: "border-red-300", green: "border-green-300", purple: "border-purple-300", teal: "border-teal-300", orange: "border-orange-300" };
            const bgs = { blue: "bg-blue-50", yellow: "bg-yellow-50", red: "bg-red-50", green: "bg-green-50", purple: "bg-purple-50", teal: "bg-teal-50", orange: "bg-orange-50" };
            const texts = { blue: "text-blue-800", yellow: "text-yellow-800", red: "text-red-800", green: "text-green-800", purple: "text-purple-800", teal: "text-teal-800", orange: "text-orange-800" };
            
            return (
                <div className={`${bgs[color]} p-6 rounded-3xl border-b-8 border-x-4 border-t-4 ${borders[color]} mb-6 shadow-lg`}>
                    <h3 className={`font-black text-2xl ${texts[color]} mb-4 flex items-center gap-3`}>
                        <i className={`fa-solid ${icon} text-3xl`}></i> {title}
                    </h3>
                    <div className="space-y-4 text-gray-700 font-medium">
                        {children}
                    </div>
                </div>
            );
        };

        // --- UNSERE SPIELFIGUR PASSI ---
        const PassiCharacter = () => (
            <div className="relative flex flex-col items-center animate-bounce z-50 hover:scale-110 transition-transform cursor-pointer" style={{ filter: 'drop-shadow(0px 6px 4px rgba(0,0,0,0.4))' }}>
                <div className="absolute -top-8 bg-white text-[10px] font-black px-2 py-1 rounded-full border-2 border-blue-400 shadow-sm text-blue-600 whitespace-nowrap">Ich bin Passi!</div>
                {/* Key Head (Gesicht) */}
                <div className="relative bg-yellow-400 w-12 h-12 rounded-full border-4 border-yellow-600 flex items-center justify-center z-10 shadow-inner">
                    <div className="absolute top-3 left-2.5 w-2 h-2 bg-black rounded-full"></div>
                    <div className="absolute top-3 right-2.5 w-2 h-2 bg-black rounded-full"></div>
                    <div className="absolute top-6 w-4 h-2 border-b-4 border-black rounded-full"></div>
                    {/* Rosa Bäckchen */}
                    <div className="absolute top-5 left-1 w-2 h-1.5 bg-pink-400 rounded-full opacity-60"></div>
                    <div className="absolute top-5 right-1 w-2 h-1.5 bg-pink-400 rounded-full opacity-60"></div>
                </div>
                {/* Key Stem (Körper) */}
                <div className="w-4 h-8 bg-yellow-400 border-x-4 border-b-4 border-yellow-600 -mt-2 relative z-0">
                    <div className="absolute bottom-1 -right-4 w-5 h-2.5 bg-yellow-400 border-y-4 border-r-4 border-yellow-600 rounded-r-sm"></div>
                    <div className="absolute bottom-5 -right-4 w-4 h-2.5 bg-yellow-400 border-y-4 border-r-4 border-yellow-600 rounded-r-sm"></div>
                </div>
            </div>
        );

        // --- HINTERGRÜNDE FÜR DIE WELTEN-MAPS ---
        const WorldBackground = ({ worldId }) => {
            switch(worldId) {
                case 1: // Grasland
                    return (
                        <div className="absolute inset-0 bg-sky-300 overflow-hidden pointer-events-none">
                            <div className="absolute top-10 left-20 text-white opacity-80 animate-float"><i className="fa-solid fa-cloud text-6xl"></i></div>
                            <div className="absolute top-32 right-10 text-white opacity-60 animate-float" style={{animationDelay:'1s'}}><i className="fa-solid fa-cloud text-8xl"></i></div>
                            <div className="absolute -bottom-32 -left-20 w-[150%] h-64 bg-green-500 rounded-[100%] border-t-8 border-green-600"></div>
                            <div className="absolute -bottom-40 right-10 w-96 h-80 bg-green-400 rounded-[100%] border-t-8 border-green-500"></div>
                            <div className="absolute -bottom-20 -left-10 w-80 h-60 bg-green-600 rounded-[100%] border-t-8 border-green-700"></div>
                        </div>
                    );
                case 2: // Wüste
                    return (
                        <div className="absolute inset-0 bg-orange-200 overflow-hidden pointer-events-none">
                            <div className="absolute top-10 left-1/4 text-yellow-100 opacity-90 animate-pulse"><i className="fa-solid fa-sun text-8xl"></i></div>
                            <div className="absolute top-20 right-20 text-orange-300 opacity-50"><i className="fa-solid fa-cloud text-6xl"></i></div>
                            <div className="absolute -bottom-20 -left-20 w-[120%] h-64 bg-yellow-500 rounded-[100%] border-t-8 border-yellow-600"></div>
                            <div className="absolute -bottom-32 right-0 w-96 h-80 bg-yellow-400 rounded-[100%] border-t-8 border-yellow-500"></div>
                        </div>
                    );
                case 3: // Wasserfall
                    return (
                        <div className="absolute inset-0 bg-blue-200 overflow-hidden pointer-events-none">
                            <div className="absolute top-0 right-1/3 w-32 h-full bg-blue-400 opacity-60"></div>
                            <div className="absolute top-0 right-1/3 w-8 h-full bg-blue-300 opacity-80 animate-pulse"></div>
                            <div className="absolute top-10 left-10 text-white opacity-80 animate-float"><i className="fa-solid fa-cloud text-6xl"></i></div>
                            <div className="absolute -bottom-20 -left-20 w-[150%] h-40 bg-blue-600 rounded-[100%] border-t-8 border-blue-700"></div>
                            <div className="absolute bottom-10 left-20 text-gray-400"><i className="fa-solid fa-gem text-4xl"></i></div>
                        </div>
                    );
                case 4: // Dschungel
                    return (
                        <div className="absolute inset-0 bg-emerald-800 overflow-hidden pointer-events-none">
                            <div className="absolute -top-20 -left-10 w-64 h-64 bg-emerald-600 rounded-full border-b-8 border-emerald-700"></div>
                            <div className="absolute -top-10 right-0 w-80 h-80 bg-emerald-500 rounded-full border-b-8 border-emerald-600"></div>
                            <div className="absolute -bottom-20 -left-20 w-[150%] h-64 bg-emerald-900 rounded-[100%] border-t-8 border-emerald-950"></div>
                            <div className="absolute top-1/2 left-10 text-emerald-400 opacity-30"><i className="fa-brands fa-envira text-8xl"></i></div>
                        </div>
                    );
                case 5: // Eiswelt
                    return (
                        <div className="absolute inset-0 bg-cyan-100 overflow-hidden pointer-events-none">
                            <div className="absolute top-10 left-10 text-white animate-float"><i className="fa-regular fa-snowflake text-4xl"></i></div>
                            <div className="absolute top-32 right-20 text-white animate-float" style={{animationDelay:'1s'}}><i className="fa-regular fa-snowflake text-6xl"></i></div>
                            <div className="absolute -bottom-20 -left-20 w-[120%] h-64 bg-white rounded-[100%] border-t-8 border-cyan-200"></div>
                            <div className="absolute -bottom-32 right-10 w-96 h-80 bg-cyan-50 rounded-[100%] border-t-8 border-cyan-200"></div>
                        </div>
                    );
                case 6: // Wolkenstadt
                    return (
                        <div className="absolute inset-0 bg-sky-200 overflow-hidden pointer-events-none">
                            <div className="absolute top-20 left-10 text-white opacity-90 animate-float"><i className="fa-solid fa-cloud text-8xl"></i></div>
                            <div className="absolute top-10 right-20 text-white opacity-80 animate-float" style={{animationDelay:'0.5s'}}><i className="fa-solid fa-cloud text-6xl"></i></div>
                            <div className="absolute -bottom-10 -left-10 w-64 h-64 bg-white rounded-full border-t-8 border-gray-100"></div>
                            <div className="absolute -bottom-20 left-40 w-80 h-80 bg-white rounded-full border-t-8 border-gray-100"></div>
                            <div className="absolute -bottom-10 right-0 w-72 h-72 bg-white rounded-full border-t-8 border-gray-100"></div>
                        </div>
                    );
                case 7: // Lavaburg
                    return (
                        <div className="absolute inset-0 bg-red-950 overflow-hidden pointer-events-none">
                            <div className="absolute top-20 right-20 w-32 h-32 bg-orange-500 rounded-full blur-2xl opacity-50 animate-pulse"></div>
                            <div className="absolute bottom-10 left-10 w-64 h-64 bg-red-600 rounded-full blur-3xl opacity-40"></div>
                            <div className="absolute -bottom-20 -left-20 w-[150%] h-40 bg-gray-900 rounded-[100%] border-t-8 border-orange-600"></div>
                            <div className="absolute -bottom-10 left-1/4 w-1/2 h-20 bg-orange-500 rounded-[100%] blur-sm opacity-80 animate-pulse"></div>
                        </div>
                    );
                case 8: // Sternenwelt
                    return (
                        <div className="absolute inset-0 bg-indigo-950 overflow-hidden pointer-events-none">
                            <div className="absolute top-10 left-10 text-yellow-200 opacity-80 animate-pulse"><i className="fa-solid fa-star"></i></div>
                            <div className="absolute top-40 right-20 text-yellow-200 opacity-60 animate-pulse" style={{animationDelay:'0.5s'}}><i className="fa-solid fa-star text-2xl"></i></div>
                            <div className="absolute bottom-20 left-32 text-yellow-200 opacity-90 animate-pulse" style={{animationDelay:'1s'}}><i className="fa-solid fa-star text-sm"></i></div>
                            <div className="absolute -bottom-40 -left-20 w-[150%] h-64 bg-purple-900 rounded-[100%] border-t-8 border-fuchsia-700"></div>
                            <div className="absolute top-10 right-10 w-32 h-32 bg-fuchsia-600 rounded-full opacity-20 blur-xl"></div>
                        </div>
                    );
                default:
                    return <div className="absolute inset-0 bg-gray-200"></div>;
            }
        };

        // --- LEVEL INHALTE (24 LEVEL) ---

        // Welt 1: Grasland
        const L1_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Was ist ein Passwort?" icon="fa-book-open" color="green">
                    <p>Willkommen im Grasland der Geheimnisse! 🌳</p>
                    <p>Stell dir vor, dein Haus hat keine Tür. Jeder könnte einfach reinspazieren! Damit das im Internet nicht passiert, gibt es <strong>Passwörter</strong>.</p>
                    <p>Ein Passwort ist wie der <strong>Schlüssel zu deiner Haustür</strong>. Nur wer den Schlüssel hat, kommt an deine Spiele, Bilder und Nachrichten.</p>
                </DialogBox>
                <Button3D color="green" onClick={onComplete}>Alles klar! 👍</Button3D>
            </div>
        );
        const L1_2 = ({ onComplete }) => {
            const [sel, setSel] = useState({});
            const toggle = (i) => setSel(p => ({...p, [i]: !p[i]}));
            const correct = sel.pc && sel.handy && !sel.apfel && !sel.buch;
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Wo fehlt das Schloss?" icon="fa-gamepad" color="yellow">
                        <p>Was davon braucht in der echten Welt ein digitales Passwort oder einen PIN-Code?</p>
                        <div className="grid grid-cols-2 gap-4 mt-4">
                            <button onClick={()=>toggle('pc')} className={`p-4 rounded-xl border-4 font-bold ${sel.pc ? 'bg-green-200 border-green-500' : 'bg-white border-gray-200'}`}>💻 Computer</button>
                            <button onClick={()=>toggle('apfel')} className={`p-4 rounded-xl border-4 font-bold ${sel.apfel ? 'bg-red-200 border-red-500' : 'bg-white border-gray-200'}`}>🍎 Apfel</button>
                            <button onClick={()=>toggle('handy')} className={`p-4 rounded-xl border-4 font-bold ${sel.handy ? 'bg-green-200 border-green-500' : 'bg-white border-gray-200'}`}>📱 Handy</button>
                            <button onClick={()=>toggle('buch')} className={`p-4 rounded-xl border-4 font-bold ${sel.buch ? 'bg-red-200 border-red-500' : 'bg-white border-gray-200'}`}>📖 Schulbuch</button>
                        </div>
                    </DialogBox>
                    {correct ? <Button3D color="green" onClick={onComplete}>Klasse! 🎉</Button3D> : <p className="text-center font-bold text-gray-500">Wähle die 2 richtigen Dinge!</p>}
                </div>
            );
        };
        const L1_3 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-brands fa-fort-awesome text-7xl text-green-800 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Holz-Türsteher</h2>
                    <p className="bg-gray-100 p-4 rounded-2xl border-4 border-gray-300 font-bold mb-6">"Halt! Tippe einfach irgendein Wort ein, das länger als 3 Buchstaben ist, um zu zeigen, dass du eine Tastatur bedienen kannst!"</p>
                    <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 text-2xl border-4 border-gray-400 rounded-2xl mb-6 text-center shadow-inner" placeholder="Wort eintippen..." />
                    {pw.length > 3 && <Button3D color="purple" onClick={onComplete}>Tor öffnen! 🏰</Button3D>}
                </div>
            );
        };

        // Welt 2: Wüste
        const L2_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Die Flops der Wüste" icon="fa-triangle-exclamation" color="red">
                    <p>Viele Menschen sind faul und nehmen Passwörter, die man erraten kann. Das ist, als würdest du den Schlüssel unter die Fußmatte legen!</p>
                    <div className="bg-white p-4 rounded-xl border-2 border-red-200 mt-2">
                        <p className="font-bold text-red-600">Die schlechtesten Passwörter der Welt:</p>
                        <ul className="list-disc ml-5 font-mono"><li>123456</li><li>hallo123</li><li>passwort</li></ul>
                    </div>
                    <p className="mt-2 text-red-800 font-bold">Nutze niemals deinen Namen, Tiernamen oder dein Lieblingsessen!</p>
                </DialogBox>
                <Button3D color="yellow" onClick={onComplete}>Verstanden!</Button3D>
            </div>
        );
        const L2_2 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            const correct = pw.toLowerCase() === 'bello';
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Werde zum Hacker" icon="fa-user-secret" color="blue">
                        <p>Du willst das Passwort von "Max" erraten. Er hat einen schlimmen Fehler gemacht und etwas aus seinem Leben genommen.</p>
                        <div className="bg-gray-800 text-green-400 p-4 rounded-xl font-mono text-sm mt-4">
                            <p>🔍 Akte Max:</p>
                            <p>- Alter: 11</p>
                            <p>- Haustier: Hund namens <b>Bello</b></p>
                        </div>
                        <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 mt-4 text-xl border-4 border-blue-300 rounded-xl" placeholder="Passwort erraten..." />
                    </DialogBox>
                    {correct ? <Button3D color="green" onClick={onComplete}>Gehackt! Lektion gelernt.</Button3D> : <p className="text-center font-bold">Rate weiter...</p>}
                </div>
            );
        };
        const L2_3 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            const isBad = ['123456', 'hallo', 'passwort', 'bello'].includes(pw.toLowerCase());
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-solid fa-tornado text-7xl text-yellow-600 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Sandsturm</h2>
                    <p className="bg-yellow-100 p-4 rounded-2xl border-4 border-yellow-300 font-bold mb-6">"Nur wer ein Passwort eingibt, das LÄNGER als 5 Zeichen ist und NICHT zu den Flops gehört, darf passieren!"</p>
                    <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 text-2xl border-4 border-gray-400 rounded-2xl mb-6 text-center" placeholder="Dein Passwort..." />
                    {pw.length > 5 && !isBad ? <Button3D color="purple" onClick={onComplete}>Sturm besiegen! 🏰</Button3D> : (pw.length > 0 && <p className="text-red-500 font-bold mb-4">Zu kurz oder zu bekannt!</p>)}
                </div>
            );
        };

        // Welt 3: Wasserfall
        const L3_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Die Merksatz-Methode" icon="fa-lightbulb" color="teal">
                    <p>Ein starkes Passwort sieht für andere aus wie Kauderwelsch. Aber wie merkt man sich das? Mit einem lustigen Satz!</p>
                    <div className="bg-white p-4 rounded-xl border-2 border-teal-200 mt-2">
                        <p className="font-bold">1. Der Satz:</p>
                        <p className="italic text-teal-700">"Mein kleiner Hund Bello frisst gerne 3 Knochen!"</p>
                        <p className="font-bold mt-2">2. Nur die Anfangsbuchstaben & Zeichen:</p>
                        <p className="font-mono text-2xl text-black bg-gray-100 p-2 inline-block rounded">MkHBfg3K!</p>
                    </div>
                </DialogBox>
                <Button3D color="teal" onClick={onComplete}>Genialer Trick!</Button3D>
            </div>
        );
        const L3_2 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            const correct = "IejT1A!";
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Übersetzer-Training" icon="fa-pen" color="blue">
                        <p>Mache aus diesem Satz ein Passwort nach der Methode (Achte auf Groß/Kleinschreibung):</p>
                        <p className="text-xl font-bold text-center bg-white p-4 rounded-xl border-4 border-blue-200 my-4">"Ich esse jeden Tag 1 Apfel!"</p>
                        <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 text-2xl border-4 font-mono text-center rounded-xl" />
                    </DialogBox>
                    {pw === correct ? <Button3D color="green" onClick={onComplete}>Richtig übersetzt! 🎉</Button3D> : <p className="text-center text-gray-500 font-bold">Tipp: "IejT1A!"</p>}
                </div>
            );
        };
        const L3_3 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            const correct = "MFTs2S!";
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-solid fa-water text-7xl text-blue-500 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Wasser-Rätselmeister</h2>
                    <p className="bg-blue-100 p-4 rounded-2xl border-4 border-blue-300 font-bold mb-6">"Übersetze fehlerfrei: <br/><br/>'Meine Freunde Tom spielen 2 Stunden!' "</p>
                    <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 text-2xl border-4 border-gray-400 rounded-2xl font-mono text-center mb-6" />
                    {pw === correct ? <Button3D color="purple" onClick={onComplete}>Boss besiegt! 🏰</Button3D> : (pw.length > 0 && <p className="text-red-500 font-bold mb-4">Noch nicht ganz richtig...</p>)}
                </div>
            );
        };

        // Welt 4: Dschungel
        const L4_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Der magische Notizblock" icon="fa-vault" color="orange">
                    <p>Wenn du 10 Spiele hast, brauchst du 10 <b>verschiedene</b> Passwörter! Sonst hat ein Hacker gleich alles.</p>
                    <p>Weil sich das niemand merken kann, gibt es <strong>Passwort-Manager</strong> (Passwort-Tresore). Das ist eine extrem sichere App auf dem Handy oder PC.</p>
                    <p className="bg-white p-3 rounded-xl border-2 border-orange-200 mt-2 font-bold text-orange-800">Die App merkt sich alle Kauderwelsch-Passwörter für dich!</p>
                </DialogBox>
                <Button3D color="orange" onClick={onComplete}>Sehr nützlich!</Button3D>
            </div>
        );
        const L4_2 = ({ onComplete }) => {
            const [ans, setAns] = useState(0);
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Das Master-Passwort" icon="fa-key" color="yellow">
                        <p>Damit niemand in deinen Passwort-Manager kommt, schließt du ihn mit einem <strong>einzigen, besonders starken Passwort</strong> ab. Dem Master-Passwort!</p>
                        <p className="font-bold mt-4">Wie sollte dieses Master-Passwort sein?</p>
                        <div className="space-y-2 mt-4">
                            <button onClick={()=>setAns(1)} className={`w-full p-3 rounded-xl border-4 text-left font-bold ${ans===1?'bg-red-200 border-red-500':'bg-white'}`}>A) Mein Vorname</button>
                            <button onClick={()=>setAns(2)} className={`w-full p-3 rounded-xl border-4 text-left font-bold ${ans===2?'bg-green-200 border-green-500':'bg-white'}`}>B) Ein starker Merksatz im Kopf</button>
                        </div>
                    </DialogBox>

                        <div className="w-full max-w-4xl bg-white rounded-[2rem] shadow-[0_20px_0_rgba(0,0,0,0.3)] overflow-hidden border-8 border-gray-700 animate-fade-in-up">
                            <div className="bg-gray-800 p-4 flex justify-between items-center text-white border-b-4 border-gray-900">
                                <button onClick={()=>setView('world')} className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-xl font-bold shadow-sm transition-colors border-2 border-gray-600"><i className="fa-solid fa-arrow-left"></i> Welt verlassen</button>
                                <h2 className="font-black text-xl tracking-widest">LEVEL {activeLevelId}</h2>
                                <div className="w-32"></div>
                            </div>
                            <div className="p-8 md:p-12">
                                {LvlComp && <LvlComp onComplete={onLevelComplete} />}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'world') {
                const W = WORLDS.find(w => w.id === activeWorldId);
                
                // Fortschritt berechnen
                const [maxW, maxL] = maxUnlocked.split('-').map(Number);
                let progress = 0;
                if (maxW > W.id) progress = 100;
                else if (maxW === W.id) progress = Math.round(((maxL - 1) / W.levels.length) * 100);

                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-4 md:p-8">
                        
                        {/* Wrapper für die Weltkarte */}
                        <div className="w-full max-w-5xl animate-pop-in">
                            
                            {/* Kopfbalken über der Map */}
                            <div className="flex justify-between items-center mb-4 text-white">
                                <button onClick={()=>setView('overview')} className="bg-red-600 hover:bg-red-500 px-5 py-3 rounded-xl font-black shadow-md transition-colors border-b-4 border-red-800 flex items-center gap-2">
                                    <i className="fa-solid fa-arrow-left"></i> Übersicht
                                </button>
                            </div>

                            {/* Die 2D Map im Screenshot-Style */}
                            <div className="relative w-full aspect-square md:aspect-video rounded-3xl overflow-hidden border-8 border-gray-800 shadow-2xl bg-sky-200">
                                
                                {/* Der Welt-Hintergrund */}
                                <WorldBackground worldId={W.id} />

                                {/* UI: Welt Name (Oben Links) */}
                                <div className="absolute top-4 left-4 bg-gray-800 text-white font-black px-4 py-2 rounded-xl shadow-lg border-2 border-gray-600 z-30 uppercase tracking-widest text-sm md:text-base">
                                    Welt {W.id}: {W.title}
                                </div>

                                {/* UI: Fortschritt (Oben Rechts) */}
                                <div className="absolute top-4 right-4 bg-white text-gray-800 font-black px-4 py-2 rounded-xl shadow-lg border-2 border-gray-200 z-30 w-48">
                                    <div className="flex justify-between text-xs mb-1 text-gray-500">
                                        <span>FORTSCHRITT</span>
                                        <span>{progress}%</span>
                                    </div>
                                    <div className="w-full h-3 bg-gray-200 rounded-full border border-gray-300 overflow-hidden">
                                        <div className="h-full bg-blue-500 transition-all" style={{width: `${progress}%`}}></div>
                                    </div>
                                </div>

                                {/* Der gestrichelte Pfad */}
                                <svg className="absolute inset-0 w-full h-full pointer-events-none z-10">
                                    {/* Pfad 1: Start zu Mitte */}
                                    <line x1="20%" y1="75%" x2="55%" y2="55%" stroke="#eab308" strokeWidth="6" strokeDasharray="10 10" strokeLinecap="round" />
                                    <line x1="20%" y1="75%" x2="55%" y2="55%" stroke="#ca8a04" strokeWidth="6" strokeDasharray="10 10" transform="translate(0, 4)" className="opacity-50" />
                                    
                                    {/* Pfad 2: Mitte zu Boss */}
                                    <line x1="55%" y1="55%" x2="30%" y2="25%" stroke="#eab308" strokeWidth="6" strokeDasharray="10 10" strokeLinecap="round" />
                                    <line x1="55%" y1="55%" x2="30%" y2="25%" stroke="#ca8a04" strokeWidth="6" strokeDasharray="10 10" transform="translate(0, 4)" className="opacity-50" />
                                </svg>

                                {/* Level Knotenpunkte auf der Map */}
                                {W.levels.map((l, idx) => {
                                    const unl = isUnlocked(l.n);
                                    const comp = isCompleted(l.n);
                                    const curr = l.n === maxUnlocked;
                                    
                                    const [maxW, maxL] = maxUnlocked.split('-').map(Number);
                                    const isPassiHere = (W.id === maxW && (idx + 1) === maxL) || (W.id < maxW && idx === W.levels.length - 1);

                                    // Feste Positionen für die 3 Nodes im ZickZack
                                    const pos = idx === 0 ? {left:'20%', top:'75%'} : idx === 1 ? {left:'55%', top:'55%'} : {left:'30%', top:'25%'};

                                    return (
                                        <div key={l.n} className="absolute z-20 transform -translate-x-1/2 -translate-y-1/2" style={pos}>
                                            
                                            {/* START-Schild am ersten Level */}
                                            {idx === 0 && <div className="absolute -bottom-10 -left-10 bg-red-600 text-white font-black text-sm px-3 py-1 transform -rotate-12 border-2 border-white rounded shadow-lg z-30">START</div>}
                                            
                                            {/* Passi die Spielfigur */}
                                            {isPassiHere && (
                                                <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1 z-50 pointer-events-none">
                                                    <PassiCharacter />
                                                </div>
                                            )}

                                            <button 
                                                disabled={!unl}
                                                onClick={() => { setActiveLevelId(l.n); setView('level'); }}
                                                className={`relative flex items-center justify-center shadow-xl transition-transform hover:scale-110 
                                                    ${l.boss ? 'w-24 h-24 rounded-3xl' : 'w-16 h-16 rounded-full'}
                                                    ${curr ? 'bg-yellow-400 border-4 border-white ring-4 ring-yellow-400 animate-pulse' : 
                                                      comp ? 'bg-blue-500 border-4 border-white opacity-90' : 
                                                      'bg-gray-400 border-4 border-gray-300 opacity-90'}`}
                                            >
                                                {/* Icon in der Mitte des Knotens */}
                                                {curr ? <i className="fa-solid fa-play text-2xl text-yellow-900 ml-1 drop-shadow-sm"></i> :
                                                 comp ? <i className="fa-solid fa-check text-2xl text-white drop-shadow-sm"></i> :
                                                 <i className={`fa-solid fa-lock text-2xl ${l.boss ? 'text-gray-300' : 'text-gray-200'} drop-shadow-sm`}></i>}
                                                
                                                {/* Schattiertes Boss-Icon im Hintergrund (wenn es eine Burg ist) */}
                                                {l.boss && !comp && !curr && <i className="fa-brands fa-fort-awesome absolute text-5xl text-gray-500 opacity-20 pointer-events-none"></i>}
                                                {l.boss && (comp || curr) && <i className="fa-brands fa-fort-awesome absolute text-5xl text-white opacity-30 pointer-events-none"></i>}
                                            </button>
                                            
                                            {/* Unsichtbares Label drunter */}
                                            <div className="absolute -bottom-8 left-1/2 transform -translate-x-1/2 whitespace-nowrap bg-gray-900/80 text-white text-xs font-bold px-3 py-1 rounded-full pointer-events-none">
                                                {l.boss ? 'Boss-Burg' : `Level ${idx + 1}`}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            // OVERVIEW MAP (3D Inseln)
            return (
                <div className="min-h-screen bg-sky-300 pb-20 relative overflow-hidden">
                    {/* Wolken Deko */}
                    <div className="absolute top-10 left-10 text-white/50 text-8xl animate-float" style={{animationDelay: '0s'}}><i className="fa-solid fa-cloud"></i></div>
                    <div className="absolute top-40 right-20 text-white/50 text-9xl animate-float" style={{animationDelay: '1s'}}><i className="fa-solid fa-cloud"></i></div>

                    <div className="max-w-6xl mx-auto p-4 md:p-8 relative z-10 animate-fade-in-up">
                        <div className="bg-white/90 p-6 rounded-[2rem] shadow-xl border-b-8 border-white mb-12 text-center inline-block mx-auto transform -rotate-2">
                            <h1 className="text-5xl md:text-7xl font-black text-blue-600 tracking-tighter drop-shadow-md">Super Passwort World <span className="text-yellow-400">3D</span></h1>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {WORLDS.map((w, i) => {
                                const wUnlocked = isUnlocked(`${w.id}-1`);
                                const [maxW, maxL] = maxUnlocked.split('-').map(Number);
                                const isPassiHereOnMap = w.id === maxW;
                                
                                return (
                                    <button 
                                        key={w.id} 
                                        disabled={!wUnlocked}
                                        onClick={() => { setActiveWorldId(w.id); setView('world'); }}
                                        className={`island-3d relative flex flex-col items-center p-6 rounded-[2.5rem] bg-gradient-to-b ${wUnlocked ? w.gradient : 'from-gray-400 to-gray-600'} text-white border-4 ${wUnlocked ? 'border-white/50' : 'border-gray-500'} ${wUnlocked ? 'cursor-pointer hover:brightness-110' : 'cursor-not-allowed opacity-80'} `}
                                        style={{ animationDelay: `${i * 100}ms` }}
                                    >
                                        <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center text-4xl shadow-inner mb-4 backdrop-blur-sm">
                                            {wUnlocked ? <i className={`fa-solid ${w.icon}`}></i> : <i className="fa-solid fa-lock text-gray-300"></i>}
                                        </div>
                                        <h2 className="font-black text-2xl mb-2 drop-shadow-md">{w.title}</h2>
                                        <div className="bg-black/20 px-4 py-1 rounded-full font-bold text-sm">Welt {w.id}</div>
                                        
                                        {/* Passi auf der Weltkarte */}
                                        {wUnlocked && isPassiHereOnMap && (
                                            <div className="absolute -top-12 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none">
                                                <PassiCharacter />
                                            </div>
                                        )}

                                        {/* Neue Welt Indikator */}
                                        {wUnlocked && maxUnlocked.startsWith(`${w.id}-`) && (
                                            <div className="absolute -top-4 -right-4 bg-red-500 text-white font-black px-4 py-2 rounded-full shadow-lg animate-bounce border-2 border-white">
                                                HIER!
                                            </div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
