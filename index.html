<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Passwort World 3D</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* 3D Button Effekte */
        .btn-3d {
            transition: all 0.1s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        .btn-3d:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.2);
        }
        
        /* Island 3D Effekt */
        .island-3d {
            box-shadow: 0 15px 0 rgba(0,0,0,0.15), 0 20px 25px -5px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .island-3d:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 20px 0 rgba(0,0,0,0.15), 0 25px 30px -5px rgba(0,0,0,0.2);
        }
        .island-3d:active:not(:disabled) {
            transform: translateY(10px);
            box-shadow: 0 5px 0 rgba(0,0,0,0.15), 0 10px 10px -5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-sky-200 overflow-x-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- HILFS-KOMPONENTEN ---
        const Button3D = ({ children, onClick, color = "blue", className = "", disabled = false }) => {
            const colorMap = {
                blue: "bg-blue-500 hover:bg-blue-400 text-white",
                green: "bg-green-500 hover:bg-green-400 text-white",
                red: "bg-red-500 hover:bg-red-400 text-white",
                yellow: "bg-yellow-400 hover:bg-yellow-300 text-yellow-900",
                purple: "bg-purple-500 hover:bg-purple-400 text-white",
                gray: "bg-gray-400 hover:bg-gray-300 text-white",
            };
            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled}
                    className={`btn-3d w-full py-4 font-bold text-xl rounded-2xl ${colorMap[color]} ${disabled ? 'opacity-50 cursor-not-allowed transform-none shadow-none' : ''} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const DialogBox = ({ title, icon, children, color = "blue" }) => {
            const borders = { blue: "border-blue-300", yellow: "border-yellow-300", red: "border-red-300", green: "border-green-300", purple: "border-purple-300", teal: "border-teal-300", orange: "border-orange-300" };
            const bgs = { blue: "bg-blue-50", yellow: "bg-yellow-50", red: "bg-red-50", green: "bg-green-50", purple: "bg-purple-50", teal: "bg-teal-50", orange: "bg-orange-50" };
            const texts = { blue: "text-blue-800", yellow: "text-yellow-800", red: "text-red-800", green: "text-green-800", purple: "text-purple-800", teal: "text-teal-800", orange: "text-orange-800" };
            
            return (
                <div className={`${bgs[color]} p-6 rounded-3xl border-b-8 border-x-4 border-t-4 ${borders[color]} mb-6 shadow-lg`}>
                    <h3 className={`font-black text-2xl ${texts[color]} mb-4 flex items-center gap-3`}>
                        <i className={`fa-solid ${icon} text-3xl`}></i> {title}
                    </h3>
                    <div className="space-y-4 text-gray-700 font-medium">
                        {children}
                    </div>
                </div>
            );
        };

        // --- LEVEL INHALTE (24 LEVEL) ---

        // Welt 1: Grasland
        const L1_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Was ist ein Passwort?" icon="fa-book-open" color="green">
                    <p>Willkommen im Grasland der Geheimnisse! 🌳</p>
                    <p>Stell dir vor, dein Haus hat keine Tür. Jeder könnte einfach reinspazieren! Damit das im Internet nicht passiert, gibt es <strong>Passwörter</strong>.</p>
                    <p>Ein Passwort ist wie der <strong>Schlüssel zu deiner Haustür</strong>. Nur wer den Schlüssel hat, kommt an deine Spiele, Bilder und Nachrichten.</p>
                </DialogBox>
                <Button3D color="green" onClick={onComplete}>Alles klar! 👍</Button3D>
            </div>
        );
        const L1_2 = ({ onComplete }) => {
            const [sel, setSel] = useState({});
            const toggle = (i) => setSel(p => ({...p, [i]: !p[i]}));
            const correct = sel.pc && sel.handy && !sel.apfel && !sel.buch;
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Wo fehlt das Schloss?" icon="fa-gamepad" color="yellow">
                        <p>Was davon braucht in der echten Welt ein digitales Passwort oder einen PIN-Code?</p>
                        <div className="grid grid-cols-2 gap-4 mt-4">
                            <button onClick={()=>toggle('pc')} className={`p-4 rounded-xl border-4 font-bold ${sel.pc ? 'bg-green-200 border-green-500' : 'bg-white border-gray-200'}`}>💻 Computer</button>
                            <button onClick={()=>toggle('apfel')} className={`p-4 rounded-xl border-4 font-bold ${sel.apfel ? 'bg-red-200 border-red-500' : 'bg-white border-gray-200'}`}>🍎 Apfel</button>
                            <button onClick={()=>toggle('handy')} className={`p-4 rounded-xl border-4 font-bold ${sel.handy ? 'bg-green-200 border-green-500' : 'bg-white border-gray-200'}`}>📱 Handy</button>
                            <button onClick={()=>toggle('buch')} className={`p-4 rounded-xl border-4 font-bold ${sel.buch ? 'bg-red-200 border-red-500' : 'bg-white border-gray-200'}`}>📖 Schulbuch</button>
                        </div>
                    </DialogBox>
                    {correct ? <Button3D color="green" onClick={onComplete}>Klasse! 🎉</Button3D> : <p className="text-center font-bold text-gray-500">Wähle die 2 richtigen Dinge!</p>}
                </div>
            );
        };
        const L1_3 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-brands fa-fort-awesome text-7xl text-green-800 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Holz-Türsteher</h2>
                    <p className="bg-gray-100 p-4 rounded-2xl border-4 border-gray-300 font-bold mb-6">"Halt! Tippe einfach irgendein Wort ein, das länger als 3 Buchstaben ist, um zu zeigen, dass du eine Tastatur bedienen kannst!"</p>
                    <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 text-2xl border-4 border-gray-400 rounded-2xl mb-6 text-center shadow-inner" placeholder="Wort eintippen..." />
                    {pw.length > 3 && <Button3D color="purple" onClick={onComplete}>Tor öffnen! 🏰</Button3D>}
                </div>
            );
        };

        // Welt 2: Wüste
        const L2_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Die Flops der Wüste" icon="fa-triangle-exclamation" color="red">
                    <p>Viele Menschen sind faul und nehmen Passwörter, die man erraten kann. Das ist, als würdest du den Schlüssel unter die Fußmatte legen!</p>
                    <div className="bg-white p-4 rounded-xl border-2 border-red-200 mt-2">
                        <p className="font-bold text-red-600">Die schlechtesten Passwörter der Welt:</p>
                        <ul className="list-disc ml-5 font-mono"><li>123456</li><li>hallo123</li><li>passwort</li></ul>
                    </div>
                    <p className="mt-2 text-red-800 font-bold">Nutze niemals deinen Namen, Tiernamen oder dein Lieblingsessen!</p>
                </DialogBox>
                <Button3D color="yellow" onClick={onComplete}>Verstanden!</Button3D>
            </div>
        );
        const L2_2 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            const correct = pw.toLowerCase() === 'bello';
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Werde zum Hacker" icon="fa-user-secret" color="blue">
                        <p>Du willst das Passwort von "Max" erraten. Er hat einen schlimmen Fehler gemacht und etwas aus seinem Leben genommen.</p>
                        <div className="bg-gray-800 text-green-400 p-4 rounded-xl font-mono text-sm mt-4">
                            <p>🔍 Akte Max:</p>
                            <p>- Alter: 11</p>
                            <p>- Haustier: Hund namens <b>Bello</b></p>
                        </div>
                        <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 mt-4 text-xl border-4 border-blue-300 rounded-xl" placeholder="Passwort erraten..." />
                    </DialogBox>
                    {correct ? <Button3D color="green" onClick={onComplete}>Gehackt! Lektion gelernt.</Button3D> : <p className="text-center font-bold">Rate weiter...</p>}
                </div>
            );
        };
        const L2_3 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            const isBad = ['123456', 'hallo', 'passwort', 'bello'].includes(pw.toLowerCase());
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-solid fa-tornado text-7xl text-yellow-600 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Sandsturm</h2>
                    <p className="bg-yellow-100 p-4 rounded-2xl border-4 border-yellow-300 font-bold mb-6">"Nur wer ein Passwort eingibt, das LÄNGER als 5 Zeichen ist und NICHT zu den Flops gehört, darf passieren!"</p>
                    <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 text-2xl border-4 border-gray-400 rounded-2xl mb-6 text-center" placeholder="Dein Passwort..." />
                    {pw.length > 5 && !isBad ? <Button3D color="purple" onClick={onComplete}>Sturm besiegen! 🏰</Button3D> : (pw.length > 0 && <p className="text-red-500 font-bold mb-4">Zu kurz oder zu bekannt!</p>)}
                </div>
            );
        };

        // Welt 3: Wasserfall
        const L3_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Die Merksatz-Methode" icon="fa-lightbulb" color="teal">
                    <p>Ein starkes Passwort sieht für andere aus wie Kauderwelsch. Aber wie merkt man sich das? Mit einem lustigen Satz!</p>
                    <div className="bg-white p-4 rounded-xl border-2 border-teal-200 mt-2">
                        <p className="font-bold">1. Der Satz:</p>
                        <p className="italic text-teal-700">"Mein kleiner Hund Bello frisst gerne 3 Knochen!"</p>
                        <p className="font-bold mt-2">2. Nur die Anfangsbuchstaben & Zeichen:</p>
                        <p className="font-mono text-2xl text-black bg-gray-100 p-2 inline-block rounded">MkHBfg3K!</p>
                    </div>
                </DialogBox>
                <Button3D color="teal" onClick={onComplete}>Genialer Trick!</Button3D>
            </div>
        );
        const L3_2 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            const correct = "IejT1A!";
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Übersetzer-Training" icon="fa-pen" color="blue">
                        <p>Mache aus diesem Satz ein Passwort nach der Methode (Achte auf Groß/Kleinschreibung):</p>
                        <p className="text-xl font-bold text-center bg-white p-4 rounded-xl border-4 border-blue-200 my-4">"Ich esse jeden Tag 1 Apfel!"</p>
                        <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 text-2xl border-4 font-mono text-center rounded-xl" />
                    </DialogBox>
                    {pw === correct ? <Button3D color="green" onClick={onComplete}>Richtig übersetzt! 🎉</Button3D> : <p className="text-center text-gray-500 font-bold">Tipp: "IejT1A!"</p>}
                </div>
            );
        };
        const L3_3 = ({ onComplete }) => {
            const [pw, setPw] = useState('');
            const correct = "MFTs2S!";
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-solid fa-water text-7xl text-blue-500 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Wasser-Rätselmeister</h2>
                    <p className="bg-blue-100 p-4 rounded-2xl border-4 border-blue-300 font-bold mb-6">"Übersetze fehlerfrei: <br/><br/>'Meine Freunde Tom spielen 2 Stunden!' "</p>
                    <input type="text" value={pw} onChange={e=>setPw(e.target.value)} className="w-full p-4 text-2xl border-4 border-gray-400 rounded-2xl font-mono text-center mb-6" />
                    {pw === correct ? <Button3D color="purple" onClick={onComplete}>Boss besiegt! 🏰</Button3D> : (pw.length > 0 && <p className="text-red-500 font-bold mb-4">Noch nicht ganz richtig...</p>)}
                </div>
            );
        };

        // Welt 4: Dschungel
        const L4_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Der magische Notizblock" icon="fa-vault" color="orange">
                    <p>Wenn du 10 Spiele hast, brauchst du 10 <b>verschiedene</b> Passwörter! Sonst hat ein Hacker gleich alles.</p>
                    <p>Weil sich das niemand merken kann, gibt es <strong>Passwort-Manager</strong> (Passwort-Tresore). Das ist eine extrem sichere App auf dem Handy oder PC.</p>
                    <p className="bg-white p-3 rounded-xl border-2 border-orange-200 mt-2 font-bold text-orange-800">Die App merkt sich alle Kauderwelsch-Passwörter für dich!</p>
                </DialogBox>
                <Button3D color="orange" onClick={onComplete}>Sehr nützlich!</Button3D>
            </div>
        );
        const L4_2 = ({ onComplete }) => {
            const [ans, setAns] = useState(0);
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Das Master-Passwort" icon="fa-key" color="yellow">
                        <p>Damit niemand in deinen Passwort-Manager kommt, schließt du ihn mit einem <strong>einzigen, besonders starken Passwort</strong> ab. Dem Master-Passwort!</p>
                        <p className="font-bold mt-4">Wie sollte dieses Master-Passwort sein?</p>
                        <div className="space-y-2 mt-4">
                            <button onClick={()=>setAns(1)} className={`w-full p-3 rounded-xl border-4 text-left font-bold ${ans===1?'bg-red-200 border-red-500':'bg-white'}`}>A) Mein Vorname</button>
                            <button onClick={()=>setAns(2)} className={`w-full p-3 rounded-xl border-4 text-left font-bold ${ans===2?'bg-green-200 border-green-500':'bg-white'}`}>B) Ein starker Merksatz im Kopf</button>
                        </div>
                    </DialogBox>
                    {ans === 2 && <Button3D color="green" onClick={onComplete}>Goldrichtig! 🎉</Button3D>}
                    {ans === 1 && <p className="text-red-500 font-bold text-center">Dann wäre der Tresor sofort offen!</p>}
                </div>
            );
        };
        const L4_3 = ({ onComplete }) => {
            const [ans, setAns] = useState(0);
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-solid fa-leaf text-7xl text-emerald-600 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Ordnungs-Affe</h2>
                    <p className="bg-emerald-100 p-4 rounded-2xl border-4 border-emerald-300 font-bold mb-6">"Uuuh Aaah! Wo speicherst du deine Passwörter richtig?"</p>
                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <button onClick={()=>setAns(1)} className={`p-6 rounded-2xl border-4 font-black text-xl ${ans===1?'bg-red-200 border-red-500':'bg-white border-gray-300 hover:border-blue-400'}`}><i className="fa-solid fa-note-sticky text-3xl block mb-2"></i> Post-It am PC</button>
                        <button onClick={()=>setAns(2)} className={`p-6 rounded-2xl border-4 font-black text-xl ${ans===2?'bg-green-200 border-green-500':'bg-white border-gray-300 hover:border-blue-400'}`}><i className="fa-solid fa-vault text-3xl block mb-2"></i> Passwort-Tresor App</button>
                    </div>
                    {ans === 2 && <Button3D color="purple" onClick={onComplete}>Boss besiegt! 🏰</Button3D>}
                    {ans === 1 && <p className="text-red-500 font-bold">Nein! Das kann jeder abschreiben!</p>}
                </div>
            );
        };

        // Welt 5: Eiswelt
        const L5_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Biometrie" icon="fa-fingerprint" color="blue">
                    <p>Manchmal tippt man gar kein Passwort, sondern nutzt <strong>Biometrie</strong>.</p>
                    <p>Das heißt: Dein Körper ist der Schlüssel! Weil er einzigartig auf der Welt ist.</p>
                    <div className="flex justify-around mt-4 text-blue-900 font-bold">
                        <div className="text-center"><i className="fa-solid fa-fingerprint text-4xl block mb-2"></i> Fingerabdruck</div>
                        <div className="text-center"><i className="fa-solid fa-face-smile text-4xl block mb-2"></i> Gesichtserkennung</div>
                    </div>
                </DialogBox>
                <Button3D color="blue" onClick={onComplete}>Cool!</Button3D>
            </div>
        );
        const L5_2 = ({ onComplete }) => {
            const [ans, setAns] = useState(0);
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Eisiges Quiz" icon="fa-question-circle" color="teal">
                        <p className="font-bold">Was ist ein Nachteil von Biometrie (z.B. Face-ID)?</p>
                        <div className="space-y-3 mt-4">
                            <button onClick={()=>setAns(1)} className={`w-full p-3 rounded-xl border-4 text-left font-bold ${ans===1?'bg-green-200 border-green-500':'bg-white'}`}>A) Wenn ich schlafe, könnte jemand das Handy vor mein Gesicht halten.</button>
                            <button onClick={()=>setAns(2)} className={`w-full p-3 rounded-xl border-4 text-left font-bold ${ans===2?'bg-red-200 border-red-500':'bg-white'}`}>B) Ich könnte mein Gesicht vergessen.</button>
                        </div>
                    </DialogBox>
                    {ans === 1 && <Button3D color="green" onClick={onComplete}>Exakt! 🎉</Button3D>}
                </div>
            );
        };
        const L5_3 = ({ onComplete }) => {
            const [progress, setProgress] = useState(0);
            let timer = null;
            const startScan = () => { timer = setInterval(() => setProgress(p => Math.min(p + 10, 100)), 150); };
            const stopScan = () => { clearInterval(timer); if(progress < 100) setProgress(0); };
            
            return (
                <div className="text-center animate-pop-in select-none">
                    <i className="fa-solid fa-snowflake text-7xl text-cyan-400 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Das Eis-Schloss</h2>
                    <p className="bg-cyan-100 p-4 rounded-2xl border-4 border-cyan-300 font-bold mb-6">"Lege deinen Finger auf den Scanner und halte ihn gedrückt, bis er voll ist!"</p>
                    
                    <button 
                        onMouseDown={startScan} onMouseUp={stopScan} onMouseLeave={stopScan}
                        onTouchStart={startScan} onTouchEnd={stopScan}
                        className={`w-32 h-32 rounded-full border-8 mx-auto mb-6 flex items-center justify-center transition-all ${progress===100?'border-green-500 text-green-500':'border-cyan-300 text-cyan-500 hover:bg-cyan-50'}`}
                    >
                        <i className={`fa-solid fa-fingerprint text-6xl ${progress>0 ? 'animate-pulse':''}`}></i>
                    </button>
                    
                    <div className="w-full h-6 bg-gray-200 rounded-full mb-6 overflow-hidden">
                        <div className="h-full bg-cyan-500 transition-all duration-100" style={{width: `${progress}%`}}></div>
                    </div>

                    {progress === 100 && <Button3D color="purple" onClick={onComplete}>Schloss aufgetaut! 🏰</Button3D>}
                </div>
            );
        };

        // Welt 6: Wolkenstadt
        const L6_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Doppelter Boden (2FA)" icon="fa-mobile-screen" color="blue">
                    <p>Profis nutzen die <strong>Zwei-Faktor-Authentifizierung (2FA)</strong>. Das ist wie eine Tür mit zwei verschiedenen Schlössern.</p>
                    <div className="flex items-center justify-center gap-4 my-4 font-bold text-lg">
                        <div className="bg-white p-3 rounded-xl border-4 border-blue-200 text-center"><i className="fa-solid fa-key text-2xl"></i><br/>1. Passwort</div>
                        <div>+</div>
                        <div className="bg-white p-3 rounded-xl border-4 border-blue-200 text-center"><i className="fa-solid fa-message text-2xl"></i><br/>2. SMS Code</div>
                    </div>
                    <p>Selbst wenn ein Hacker dein Passwort klaut, braucht er immer noch dein Handy für den SMS-Code!</p>
                </DialogBox>
                <Button3D color="blue" onClick={onComplete}>Super sicher!</Button3D>
            </div>
        );
        const L6_2 = ({ onComplete }) => {
            const [num, setNum] = useState('');
            const [codeSent, setCodeSent] = useState(false);
            return (
                <div className="animate-pop-in">
                    <DialogBox title="2FA Aktivieren" icon="fa-toggle-on" color="teal">
                        <p>Lass uns 2FA für deinen Account aktivieren. Tippe eine (ausgedachte) Handynummer ein, um einen Code zu empfangen.</p>
                        <input type="text" value={num} onChange={e=>setNum(e.target.value)} placeholder="0151..." className="w-full p-4 text-xl border-4 border-teal-300 rounded-xl mt-4" />
                        {num.length > 5 && !codeSent && <button onClick={()=>setCodeSent(true)} className="mt-4 w-full p-3 bg-teal-500 text-white font-bold rounded-xl">SMS senden</button>}
                        {codeSent && <div className="mt-4 bg-green-100 border-2 border-green-500 p-3 rounded-xl text-green-800 font-bold"><i className="fa-solid fa-check"></i> 2FA ist nun aktiv!</div>}
                    </DialogBox>
                    {codeSent && <Button3D color="green" onClick={onComplete}>Weiter!</Button3D>}
                </div>
            );
        };
        const L6_3 = ({ onComplete }) => {
            const [code, setCode] = useState('');
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-solid fa-cloud text-7xl text-sky-400 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Hacker-Abwehr</h2>
                    <p className="bg-sky-100 p-4 rounded-2xl border-4 border-sky-300 font-bold mb-6">"Ein Hacker hat dein Passwort erraten! Rette deinen Account mit dem SMS-Code, der gerade ankommt!"</p>
                    
                    <div className="bg-gray-800 text-white p-6 rounded-3xl mb-6 relative">
                        <div className="bg-gray-200 text-black p-4 rounded-xl shadow-lg border-4 border-gray-400 inline-block text-left mb-4">
                            <p className="text-xs text-gray-500 mb-1">Neue SMS:</p>
                            <p className="font-mono text-xl text-blue-600 font-bold tracking-widest bg-white p-2">83519</p>
                        </div>
                        <input type="text" value={code} onChange={e=>setCode(e.target.value)} maxLength="5" placeholder="_____" className="w-40 p-4 text-3xl font-mono text-black text-center rounded-xl mx-auto block" />
                    </div>
                    {code === '83519' ? <Button3D color="purple" onClick={onComplete}>Hacker blockiert! 🏰</Button3D> : (code.length===5 && <p className="text-red-500 font-bold mb-4">Falscher Code!</p>)}
                </div>
            );
        };

        // Welt 7: Lavaburg
        const L7_1 = ({ onComplete }) => {
            const [failed, setFailed] = useState(false);
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Phishing Mail" icon="fa-envelope" color="red">
                        <p>Ein fieser Trick ist <strong>Phishing</strong> (Angeln nach Passwörtern). Hacker schicken dir Fake-E-Mails.</p>
                        <div className="bg-white p-4 border-4 border-gray-200 rounded-xl mt-4 text-left relative overflow-hidden">
                            <p className="text-sm text-gray-500 border-b pb-2 mb-2">Von: Roblox-Support@hacker-mail.ru</p>
                            <p className="font-bold">Hol dir jetzt 10.000 Robux GRATIS! Klicke auf den Link und logge dich ein!</p>
                            <button onClick={()=>setFailed(true)} className="mt-4 w-full p-3 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600">Link klicken!</button>
                            <button onClick={onComplete} className="mt-2 w-full p-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600">Sofort löschen! 🗑️</button>
                            
                            {failed && (
                                <div className="absolute inset-0 bg-red-900 text-white p-6 flex flex-col justify-center items-center text-center">
                                    <h4 className="text-2xl font-black mb-2">REINGEFALLEN!</h4>
                                    <p className="mb-4">Das war ein Trick. Der Hacker hat nun dein Passwort.</p>
                                    <button onClick={()=>setFailed(false)} className="px-4 py-2 bg-white text-red-900 font-bold rounded-xl">Nochmal</button>
                                </div>
                            )}
                        </div>
                    </DialogBox>
                </div>
            );
        };
        const L7_2 = ({ onComplete }) => {
            const [ans, setAns] = useState(0);
            return (
                <div className="animate-pop-in">
                    <DialogBox title="Goldene Regel" icon="fa-gavel" color="yellow">
                        <p className="font-bold mb-4">Dein allerbester Freund fragt dich nach deinem TikTok/Schul-Passwort, weil sein Handy kaputt ist. Was tust du?</p>
                        <div className="space-y-3">
                            <button onClick={()=>setAns(1)} className={`w-full p-4 rounded-xl border-4 text-left font-bold ${ans===1?'bg-red-200 border-red-500':'bg-white'}`}>A) Ich gebe es ihm. Wahre Freunde teilen alles.</button>
                            <button onClick={()=>setAns(2)} className={`w-full p-4 rounded-xl border-4 text-left font-bold ${ans===2?'bg-green-200 border-green-500':'bg-white'}`}>B) Ich sage Nein. Passwörter sind wie Zahnbürsten - die teilt man nicht!</button>
                        </div>
                    </DialogBox>
                    {ans === 2 && <Button3D color="green" onClick={onComplete}>Perfekte Antwort! 🎉</Button3D>}
                    {ans === 1 && <p className="text-red-600 font-bold text-center">Nein! Auch unter Freunden teilt man KEINE Passwörter!</p>}
                </div>
            );
        };
        const L7_3 = ({ onComplete }) => {
            const [ans, setAns] = useState(0);
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-solid fa-fire text-7xl text-orange-500 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Link-Täuscher</h2>
                    <p className="bg-orange-100 p-4 rounded-2xl border-4 border-orange-300 font-bold mb-6">"Du willst dich bei der Schule anmelden. Welcher Link ist der ECHTE und sichere?"</p>
                    <div className="space-y-4 mb-6">
                        <button onClick={()=>setAns(1)} className={`w-full p-4 rounded-2xl border-4 font-mono font-bold text-lg ${ans===1?'bg-red-200 border-red-500':'bg-white hover:border-gray-400'}`}>http://schule-login.hacker.com</button>
                        <button onClick={()=>setAns(2)} className={`w-full p-4 rounded-2xl border-4 font-mono font-bold text-lg ${ans===2?'bg-green-200 border-green-500':'bg-white hover:border-gray-400'}`}>https://www.meineschule.de/login</button>
                    </div>
                    {ans === 2 && <Button3D color="purple" onClick={onComplete}>Lavaburg besiegt! 🏰</Button3D>}
                    {ans === 1 && <p className="text-red-500 font-bold">Falsch! Achte auf die Endung der Internetadresse!</p>}
                </div>
            );
        };

        // Welt 8: Sternenwelt (Finale)
        const L8_1 = ({ onComplete }) => (
            <div className="animate-pop-in">
                <DialogBox title="Das Arbeitsblatt" icon="fa-pen" color="blue">
                    <p>Du bist in der Sternenwelt angekommen! Zeit, dein Wissen im echten Leben anzuwenden.</p>
                    <div className="bg-white p-6 rounded-2xl border-4 border-blue-200 mt-4 shadow-inner">
                        <p className="font-bold text-xl mb-2 text-blue-900">📝 Aufgabe:</p>
                        <p className="text-gray-700">Nimm dein Arbeitsblatt. Denke dir deinen <strong>eigenen Merksatz</strong> aus und schreibe das Geheim-Passwort dazu auf.</p>
                        <p className="mt-4 text-sm text-gray-500 italic">Zeige das fertige Passwort nachher nur deiner Lehrkraft!</p>
                    </div>
                </DialogBox>
                <Button3D color="yellow" onClick={onComplete}>Aufgeschrieben! ✏️</Button3D>
            </div>
        );
        const L8_2 = ({ onComplete }) => {
            const [password, setPassword] = useState('');
            const evaluatePassword = (pw) => {
                let score = 0; let missing = [];
                if (pw.length >= 8) score += 1; else missing.push("Min. 8 Zeichen");
                if (/[A-Z]/.test(pw)) score += 1; else missing.push("Großbuchstabe");
                if (/[a-z]/.test(pw)) score += 1; else missing.push("Kleinbuchstabe");
                if (/[0-9]/.test(pw)) score += 1; else missing.push("Zahl");
                if (/[^A-Za-z0-9]/.test(pw)) score += 1; else missing.push("Sonderzeichen");
                return { score, missing };
            };
            const { score, missing } = evaluatePassword(password);
            
            return (
                <div className="text-center animate-pop-in">
                    <i className="fa-solid fa-lock text-7xl text-blue-600 mb-4 animate-float block"></i>
                    <h2 className="text-3xl font-black mb-4">Boss: Der Computerraum</h2>
                    <p className="bg-blue-100 p-4 rounded-2xl border-4 border-blue-300 font-bold mb-6">"Teste dein neues Passwort vom Arbeitsblatt im Sicherheits-Scanner!"</p>
                    
                    <div className="bg-gray-100 p-6 rounded-3xl border-4 border-gray-300 shadow-inner">
                        <input type="text" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Dein Passwort..." className="w-full p-4 font-mono text-2xl border-4 border-white rounded-2xl text-center shadow-sm" />
                        
                        <div className="h-6 w-full bg-gray-300 rounded-full mt-6 flex overflow-hidden border-2 border-white">
                            {[1,2,3,4,5].map(v => <div key={v} className={`flex-1 transition-all ${v<=score ? (score===5?'bg-green-500':'bg-yellow-400') : 'bg-transparent border-l border-white/50'}`}></div>)}
                        </div>
                        <p className="font-bold mt-2 text-gray-600">{score}/5 Punkte erreicht</p>

                        {score < 5 && password.length > 0 && (
                            <p className="text-sm text-red-500 font-bold mt-4">Es fehlt: {missing.join(', ')}</p>
                        )}
                        {score === 5 && <div className="mt-6 animate-pop-in"><Button3D color="purple" onClick={onComplete}>Perfekt! Boss besiegt! 🏰</Button3D></div>}
                    </div>
                </div>
            );
        };
        const L8_3 = ({ onComplete }) => {
            const [q, setQ] = useState(0);
            const [points, setPoints] = useState(0);
            const [done, setDone] = useState(false);
            const questions = [
                { q: "Was ist Phishing?", a: ["Sport im Internet", "Ein Trick/Fake-Mails um Passwörter zu klauen", "Ein sicheres Passwort"], c: 1 },
                { q: "Wo speichert man 20 Passwörter am besten?", a: ["Im Passwort-Manager", "Auf Post-Its", "In den Notizen am Handy"], c: 0 },
                { q: "Was ist ein biometrisches Passwort?", a: ["Ein langes Wort", "Ein Fingerabdruck oder Gesichtsscan", "Ein Code per SMS"], c: 1 }
            ];
            
            const handleAns = (idx) => {
                if(idx === questions[q].c) setPoints(p => p+1);
                if(q < questions.length-1) setQ(q+1);
                else setDone(true);
            };

            if(done) {
                return (
                    <div className="text-center animate-pop-in">
                        <i className="fa-solid fa-trophy text-8xl text-yellow-400 mb-6 animate-float block drop-shadow-xl"></i>
                        <h2 className="text-4xl font-black mb-4 text-purple-900">SPIEL GEWONNEN!</h2>
                        <p className="text-2xl font-bold bg-yellow-100 p-4 rounded-2xl border-4 border-yellow-400 mb-8 shadow-lg">Quiz: {points} von {questions.length} richtig!</p>
                        <Button3D color="yellow" onClick={onComplete}>Feiern! 🎉</Button3D>
                    </div>
                );
            }

            return (
                <div className="animate-pop-in">
                    <DialogBox title={`Das Final-Quiz (${q+1}/${questions.length})`} icon="fa-star" color="purple">
                        <h3 className="font-bold text-2xl mb-6 text-purple-900">{questions[q].q}</h3>
                        <div className="space-y-4">
                            {questions[q].a.map((ans, i) => (
                                <button key={i} onClick={()=>handleAns(i)} className="w-full text-left p-4 bg-white border-4 border-purple-200 hover:border-purple-500 rounded-2xl font-bold text-lg shadow-sm hover:shadow-md transition-all">
                                    {ans}
                                </button>
                            ))}
                        </div>
                    </DialogBox>
                </div>
            );
        };

        // --- WELT DEFINITIONEN ---
        const WORLDS = [
            { id: 1, title: "Grasland der Geheimnisse", gradient: "from-green-300 to-green-500", icon: "fa-leaf", levels: [{n: "1-1", C: L1_1}, {n: "1-2", C: L1_2}, {n: "1-3", C: L1_3, boss: true}] },
            { id: 2, title: "Wüste der schwachen Worte", gradient: "from-yellow-300 to-amber-500", icon: "fa-sun", levels: [{n: "2-1", C: L2_1}, {n: "2-2", C: L2_2}, {n: "2-3", C: L2_3, boss: true}] },
            { id: 3, title: "Wasserfall der Weisheit", gradient: "from-blue-300 to-blue-600", icon: "fa-water", levels: [{n: "3-1", C: L3_1}, {n: "3-2", C: L3_2}, {n: "3-3", C: L3_3, boss: true}] },
            { id: 4, title: "Dschungel der Tresore", gradient: "from-emerald-400 to-green-700", icon: "fa-tree", levels: [{n: "4-1", C: L4_1}, {n: "4-2", C: L4_2}, {n: "4-3", C: L4_3, boss: true}] },
            { id: 5, title: "Eiswelt der Identität", gradient: "from-cyan-200 to-cyan-500", icon: "fa-snowflake", levels: [{n: "5-1", C: L5_1}, {n: "5-2", C: L5_2}, {n: "5-3", C: L5_3, boss: true}] },
            { id: 6, title: "Wolkenstadt des 2FA", gradient: "from-sky-300 to-indigo-400", icon: "fa-cloud", levels: [{n: "6-1", C: L6_1}, {n: "6-2", C: L6_2}, {n: "6-3", C: L6_3, boss: true}] },
            { id: 7, title: "Lavaburg der Regeln", gradient: "from-red-500 to-orange-600", icon: "fa-fire", levels: [{n: "7-1", C: L7_1}, {n: "7-2", C: L7_2}, {n: "7-3", C: L7_3, boss: true}] },
            { id: 8, title: "Sternenwelt Finale", gradient: "from-indigo-800 to-purple-800", textWhite: true, icon: "fa-star", levels: [{n: "8-1", C: L8_1}, {n: "8-2", C: L8_2}, {n: "8-3", C: L8_3, boss: true}] },
        ];

        // --- HAUPT-APP ---
        const App = () => {
            const [maxUnlocked, setMaxUnlocked] = useState('1-1');
            const [view, setView] = useState('overview'); // overview, world, level, win
            const [activeWorldId, setActiveWorldId] = useState(1);
            const [activeLevelId, setActiveLevelId] = useState(null);

            // Logik-Hilfen
            const isUnlocked = (lvlId) => {
                const [w1, l1] = lvlId.split('-').map(Number);
                const [w2, l2] = maxUnlocked.split('-').map(Number);
                if (w1 < w2) return true;
                if (w1 === w2 && l1 <= l2) return true;
                return false;
            };

            const isCompleted = (lvlId) => {
                const [w1, l1] = lvlId.split('-').map(Number);
                const [w2, l2] = maxUnlocked.split('-').map(Number);
                if (w1 < w2) return true;
                if (w1 === w2 && l1 < l2) return true;
                return false;
            };

            const getNextLvl = (currId) => {
                let [w, l] = currId.split('-').map(Number);
                if(w === 8 && l === 3) return 'win';
                if(l < 3) return `${w}-${l+1}`;
                return `${w+1}-1`;
            };

            const onLevelComplete = () => {
                const nextId = getNextLvl(activeLevelId);
                if (nextId === 'win') {
                    setView('win');
                } else {
                    const [nextW, nextL] = nextId.split('-').map(Number);
                    const [currW, currL] = activeLevelId.split('-').map(Number);
                    
                    if (!isUnlocked(nextId)) setMaxUnlocked(nextId);
                    
                    // Wenn Welt gewechselt (Boss besiegt), gehe zur Übersicht. Sonst bleibe in Welt.
                    if (nextW > currW) setView('overview');
                    else setView('world');
                }
            };

            // VIEWS
            if (view === 'win') {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-yellow-300 to-orange-500 flex items-center justify-center p-4">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl text-center max-w-2xl border-b-[16px] border-yellow-600 animate-pop-in">
                            <i className="fa-solid fa-crown text-9xl text-yellow-500 mb-8 animate-float block drop-shadow-xl"></i>
                            <h1 className="text-6xl font-black text-gray-800 mb-6 uppercase tracking-widest drop-shadow-md">Legende!</h1>
                            <p className="text-3xl text-gray-700 mb-8 font-bold">Du hast Super Passwort World 3D komplett durchgespielt.</p>
                            <Button3D color="blue" onClick={() => { setMaxUnlocked('1-1'); setView('overview'); }}>Erneut spielen</Button3D>
                        </div>
                    </div>
                );
            }

            if (view === 'level') {
                let LvlComp = null;
                WORLDS.forEach(w => w.levels.forEach(l => { if(l.n === activeLevelId) LvlComp = l.C; }));
                
                return (
                    <div className="min-h-screen bg-sky-100 p-4 md:p-8 flex items-center justify-center">
                        <div className="max-w-3xl w-full bg-white rounded-[2rem] shadow-[0_20px_0_rgba(0,0,0,0.1)] overflow-hidden border-8 border-white animate-fade-in-up">
                            <div className="bg-gray-800 p-4 flex justify-between items-center text-white">
                                <button onClick={()=>setView('world')} className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-xl font-bold shadow-sm transition-colors"><i className="fa-solid fa-arrow-left"></i> Welt</button>
                                <h2 className="font-black text-xl tracking-widest">LEVEL {activeLevelId}</h2>
                                <div className="w-20"></div>
                            </div>
                            <div className="p-8 md:p-12">
                                {LvlComp && <LvlComp onComplete={onLevelComplete} />}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'world') {
                const W = WORLDS.find(w => w.id === activeWorldId);
                return (
                    <div className={`min-h-screen bg-gradient-to-b ${W.gradient} p-4 md:p-8 flex flex-col items-center justify-center`}>
                        <div className="w-full max-w-4xl animate-pop-in">
                            <div className="flex justify-between items-center mb-8">
                                <Button3D color="gray" className="w-auto px-6" onClick={()=>setView('overview')}><i className="fa-solid fa-map"></i> Karte</Button3D>
                                <h1 className={`text-4xl md:text-5xl font-black ${W.textWhite?'text-white':'text-gray-900'} drop-shadow-lg text-center`}>Welt {W.id}</h1>
                                <div className="w-24"></div>
                            </div>
                            
                            <div className="bg-white/20 backdrop-blur-md p-8 rounded-[3rem] shadow-2xl border-4 border-white/50 flex flex-col md:flex-row justify-around items-center gap-8 relative">
                                <div className="absolute top-1/2 left-10 right-10 h-4 bg-white/30 rounded-full -z-10 hidden md:block"></div>
                                
                                {W.levels.map(l => {
                                    const unl = isUnlocked(l.n);
                                    const comp = isCompleted(l.n);
                                    const curr = l.n === maxUnlocked;
                                    
                                    return (
                                        <button 
                                            key={l.n} 
                                            disabled={!unl} 
                                            onClick={() => { setActiveLevelId(l.n); setView('level'); }}
                                            className={`island-3d flex flex-col items-center justify-center w-full md:w-1/3 p-6 rounded-3xl ${unl ? 'bg-white cursor-pointer' : 'bg-gray-300/50 cursor-not-allowed grayscale'} ${curr ? 'ring-8 ring-yellow-400 animate-pulse' : ''}`}
                                        >
                                            <div className={`w-24 h-24 rounded-full flex items-center justify-center text-4xl text-white mb-4 shadow-inner ${unl ? (l.boss ? 'bg-red-500 rounded-xl' : 'bg-blue-500') : 'bg-gray-400'}`}>
                                                {comp ? <i className="fa-solid fa-check"></i> : (!unl ? <i className="fa-solid fa-lock"></i> : (l.boss ? <i className="fa-brands fa-fort-awesome"></i> : <span className="font-black text-2xl">{l.n}</span>))}
                                            </div>
                                            <span className="font-black text-xl text-gray-800 bg-gray-100 px-4 py-2 rounded-xl shadow-sm">{l.boss ? 'Boss-Burg' : 'Level '+l.n}</span>
                                        </button>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            // OVERVIEW MAP
            return (
                <div className="min-h-screen bg-sky-300 pb-20 relative overflow-hidden">
                    {/* Wolken Deko */}
                    <div className="absolute top-10 left-10 text-white/50 text-8xl animate-float" style={{animationDelay: '0s'}}><i className="fa-solid fa-cloud"></i></div>
                    <div className="absolute top-40 right-20 text-white/50 text-9xl animate-float" style={{animationDelay: '1s'}}><i className="fa-solid fa-cloud"></i></div>

                    <div className="max-w-6xl mx-auto p-4 md:p-8 relative z-10 animate-fade-in-up">
                        <div className="bg-white/90 p-6 rounded-[2rem] shadow-xl border-b-8 border-white mb-12 text-center inline-block mx-auto transform -rotate-2">
                            <h1 className="text-5xl md:text-7xl font-black text-blue-600 tracking-tighter drop-shadow-md">Super Passwort World <span className="text-yellow-400">3D</span></h1>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {WORLDS.map((w, i) => {
                                const wUnlocked = isUnlocked(`${w.id}-1`);
                                
                                return (
                                    <button 
                                        key={w.id} 
                                        disabled={!wUnlocked}
                                        onClick={() => { setActiveWorldId(w.id); setView('world'); }}
                                        className={`island-3d relative flex flex-col items-center p-6 rounded-[2.5rem] bg-gradient-to-b ${wUnlocked ? w.gradient : 'from-gray-400 to-gray-600'} text-white border-4 ${wUnlocked ? 'border-white/50' : 'border-gray-500'} ${wUnlocked ? 'cursor-pointer hover:brightness-110' : 'cursor-not-allowed opacity-80'} `}
                                        style={{ animationDelay: `${i * 100}ms` }}
                                    >
                                        <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center text-4xl shadow-inner mb-4 backdrop-blur-sm">
                                            {wUnlocked ? <i className={`fa-solid ${w.icon}`}></i> : <i className="fa-solid fa-lock text-gray-300"></i>}
                                        </div>
                                        <h2 className="font-black text-2xl mb-2 drop-shadow-md">{w.title}</h2>
                                        <div className="bg-black/20 px-4 py-1 rounded-full font-bold text-sm">Welt {w.id}</div>
                                        
                                        {/* Neue Welt Indikator */}
                                        {wUnlocked && maxUnlocked.startsWith(`${w.id}-`) && (
                                            <div className="absolute -top-4 -right-4 bg-red-500 text-white font-black px-4 py-2 rounded-full shadow-lg animate-bounce border-2 border-white">
                                                HIER!
                                            </div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
